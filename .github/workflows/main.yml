name: crypto-signal-scan

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: signal-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore alert state
        uses: actions/cache@v4
        with:
          path: scanner/state.json
          key: signal-state-${{ github.run_id }}
          restore-keys: |
            signal-state-

      - name: Run scan
        working-directory: scanner
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TIMEFRAMES: '5m,15m'
          MA_TYPE: 'sma'
          TOP_N: '50'
          REQUIRE_MACD: 'false'
        run: node scan.js --once
